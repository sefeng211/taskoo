<!DOCTYPE html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css?family=Noto Sans" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.1/css/bulma.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="utf-8">
    <link rel="icon" type="image/x-icon" href="images/favicon.png">
    <title>Taskoo</title>
  </head>
  <body>
    <div id="error-notification" class="notification is-danger is-hidden">
      <button id="remove-error-message" class="delete" aria-label="Dismiss"></button>
      <span id="error-message"></span>
    </div>
    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">
            <span class="icon"><i class="fas fa-check" aria-hidden="true"></i></span>
          </span>
          <div>
            <h1 class="brand-title">Taskoo</h1>
            <p class="brand-subtitle">Tasks</p>
          </div>
        </div>

        <nav class="side-nav" aria-label="Task views">
          <button class="nav-item is-active" type="button" data-view="today">
            <span class="icon"><i class="fas fa-calendar-day" aria-hidden="true"></i></span>
            <span>Today</span>
          </button>
          <button class="nav-item" type="button" data-view="inbox">
            <span class="icon"><i class="fas fa-inbox" aria-hidden="true"></i></span>
            <span>Inbox</span>
          </button>
          <button class="nav-item" type="button" data-view="search">
            <span class="icon"><i class="fas fa-search" aria-hidden="true"></i></span>
            <span>Search</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <span class="status-pill">
            <span class="status-dot"></span>
            <span id="view-status">Ready</span>
          </span>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Workspace</p>
            <h2 id="view-title" class="view-title">Today</h2>
            <p id="view-subtitle" class="view-subtitle">Scheduled and due tasks</p>
          </div>
          <button class="primary-action" type="button" id="add-button">
            <span class="icon"><i class="fas fa-plus" aria-hidden="true"></i></span>
            <span>New task</span>
          </button>
        </header>

        <section class="command-bar" aria-label="Task search">
          <label class="search-box" for="search-input">
            <span class="icon"><i class="fas fa-search" aria-hidden="true"></i></span>
            <input id="search-input" type="search" placeholder="Search tasks or use c:Inbox">
          </label>
          <button class="secondary-action" type="button" id="search-button">
            <span class="icon"><i class="fas fa-arrow-right" aria-hidden="true"></i></span>
            <span>Search</span>
          </button>
        </section>

        <section class="summary-grid" aria-label="Task summary">
          <div class="summary-tile">
            <span class="summary-label">Active</span>
            <span class="summary-value" id="active-count">0</span>
          </div>
          <div class="summary-tile">
            <span class="summary-label">Completed</span>
            <span class="summary-value" id="completed-count">0</span>
          </div>
          <div class="summary-tile">
            <span class="summary-label">Groups</span>
            <span class="summary-value" id="context-count">0</span>
          </div>
        </section>

        <section id="context-switches" class="context-switches" aria-label="Groups"></section>

        <section id="task-list" class="task-list" aria-label="Tasks"></section>

        <section id="empty-state" class="empty-state is-hidden">
          <span class="icon"><i class="fas fa-check-double" aria-hidden="true"></i></span>
          <h2 class="empty-title">Nothing here</h2>
          <p class="empty-copy">No active tasks in this view.</p>
          <button class="primary-action" type="button" id="empty-add-button">
            <span class="icon"><i class="fas fa-plus" aria-hidden="true"></i></span>
            <span>New task</span>
          </button>
        </section>
      </main>
    </div>

    <dialog id="add-dialog" class="modal-dialog">
      <form id="add-form" class="modal-body" method="dialog">
        <h2 class="modal-title">New task</h2>
        <input id="input-body" class="modal-input" placeholder="Task body" autocomplete="off">
        <div class="modal-actions">
          <button class="ghost-action" type="button" id="cancel-add-button">Cancel</button>
          <button class="primary-action" type="submit" id="submit-button">
            <span class="icon"><i class="fas fa-plus" aria-hidden="true"></i></span>
            <span>Add task</span>
          </button>
        </div>
      </form>
    </dialog>

    <script src="main.js"></script>
    <script defer src="https://use.fontawesome.com/releases/v5.3.1/js/all.js"></script>
  </body>
</html>
